<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TecnoTrade | Store</title>
    <style>
        :root {
            --bg-dark: #030509;
            --text-main: #ffffff;
            --text-muted: #86868b;
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --neon-cyan: #00ffcc;
            --card-glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(10, 10, 15, 0.85);
        }

        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* FONDO ESTÁTICO (Metal Líquido) */
        .motion-bg-container {
            position: fixed; top: -10px; left: -10px; right: -10px; bottom: -10px; z-index: -3;
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png');
            background-size: cover; background-position: center;
            filter: contrast(1.15) brightness(0.35) blur(4px);
            pointer-events: none;
        }

        /* CONTENEDOR PRINCIPAL SCROLLABLE */
        .app-container {
            width: 100%; max-width: 480px; margin: 0 auto;
            height: 100vh; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 100px; /* Espacio para el bottom nav */
            scrollbar-width: none; /* Oculta scroll en Firefox */
        }
        .app-container::-webkit-scrollbar { display: none; } /* Oculta scroll en Chrome/Safari */

        /* 1. TOP NAVBAR */
        .top-navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; position: sticky; top: 0; z-index: 100;
            background: linear-gradient(to bottom, rgba(3,5,9,0.9) 0%, rgba(3,5,9,0) 100%);
        }
        .nav-icon { width: 24px; height: 24px; fill: #fff; opacity: 0.9; cursor: pointer; }
        .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin: 0; }
        .logo-text span { color: var(--neon-cyan); }

        /* 2. SEARCH BAR */
        .search-container { padding: 0 20px; margin-bottom: 20px; }
        .search-box {
            display: flex; align-items: center; gap: 12px;
            background: var(--card-glass); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 12px 16px; backdrop-filter: blur(10px);
        }
        .search-box svg { width: 18px; height: 18px; fill: var(--text-muted); }
        .search-box input {
            background: transparent; border: none; outline: none;
            color: #fff; font-size: 14px; width: 100%;
        }
        .search-box input::placeholder { color: var(--text-muted); }

        /* 3. HERO BANNER PRINCIPAL (E-commerce Style) */
        .hero-section { padding: 0 20px; margin-bottom: 24px; }
        .hero-banner {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(0, 0, 0, 0.4) 100%);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px; padding: 24px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: flex-start;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .hero-tag {
            background: #fff; color: #000; font-size: 10px; font-weight: 800;
            padding: 4px 10px; border-radius: 12px; margin-bottom: 12px; text-transform: uppercase;
        }
        .hero-title { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; line-height: 1.1; }
        .hero-subtitle { font-size: 13px; color: var(--text-muted); margin: 0 0 20px 0; max-width: 60%; }
        .hero-btn {
            background: var(--text-main); color: var(--bg-dark);
            border: none; border-radius: 20px; padding: 10px 20px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2); transition: transform 0.2s;
        }
        .hero-btn:active { transform: scale(0.95); }
        
        /* Silueta abstracta del teléfono en el Hero */
        .hero-device {
            position: absolute; right: -20px; bottom: -30px;
            width: 130px; height: 180px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 2px solid rgba(255,255,255,0.2); border-radius: 25px;
            box-shadow: -10px -10px 30px rgba(0,0,0,0.5); transform: rotate(-5deg);
        }
        .hero-device::after {
            content: ''; position: absolute; top: 15px; right: 15px;
            width: 30px; height: 30px; border-radius: 8px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 4. CATEGORÍAS RÁPIDAS (Grid) */
        .section-title { font-size: 16px; font-weight: 700; padding: 0 20px; margin-bottom: 12px; }
        
        .categories-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            padding: 0 20px; margin-bottom: 30px;
        }
        .cat-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            text-decoration: none; color: #fff;
        }
        .cat-icon-box {
            width: 60px; height: 60px; border-radius: 18px;
            background: var(--card-glass); border: 1px solid var(--border-glass);
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
        }
        .cat-item:active .cat-icon-box { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .cat-icon-box svg { width: 24px; height: 24px; fill: var(--neon-cyan); }
        .cat-name { font-size: 11px; font-weight: 600; text-align: center; }

        /* 5. BANNER PROMOCIONAL SECUNDARIO */
        .promo-section { padding: 0 20px; margin-bottom: 30px; }
        .promo-card {
            background: rgba(57, 255, 20, 0.05); border: 1px dashed rgba(57, 255, 20, 0.3);
            border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between;
        }
        .promo-text h3 { margin: 0 0 4px 0; font-size: 14px; color: var(--neon-green); font-weight: 800; }
        .promo-text p { margin: 0; font-size: 11px; color: var(--text-muted); line-height: 1.4; }
        .promo-text p span { color: #fff; font-weight: 600; }

        /* 6. BOTTOM NAVIGATION BAR */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around; padding: 12px 0 20px 0; z-index: 1000;
        }
        .nav-tab {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            text-decoration: none; color: var(--text-muted); position: relative;
        }
        .nav-tab.active { color: var(--neon-cyan); }
        .nav-tab svg { width: 22px; height: 22px; fill: currentColor; transition: transform 0.2s; }
        .nav-tab:active svg { transform: scale(0.85); }
        .nav-label { font-size: 10px; font-weight: 600; }
        
        /* Badge rojo del carrito */
        .cart-badge {
            position: absolute; top: -4px; right: -4px;
            background: #ff3b30; color: #fff; font-size: 9px; font-weight: 800;
            width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--bg-dark);
        }
    </style>
</head>
<body>

    <div class="motion-bg-container"></div>

    <div class="app-container">
        
        <!-- TOP NAVBAR -->

            <h1 class="logo-text">Tecno<span>Trade</span></h1>

                </div>
                <span class="cat-name">Vender</span>
            </a>
            <a href="reparar.html" class="cat-item">
                <div class="cat-icon-box">
                    <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.5 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.4-2.4c.4-.4.4-1 0-1.4z"/></svg>
                </div>
                <span class="cat-name">Reparar</span>
            </a>
            <a href="laptops.html" class="cat-item">
                <div class="cat-icon-box">
                    <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
                </div>
                <span class="cat-name">Laptops</span>
            </a>
        </div>

        <!-- BANNER DE SERVICIO TÉCNICO -->
        <section class="promo-section">
            <div class="promo-card">
                <div class="promo-text">
                    <h3>PROMO EXCLUSIVA ⚡</h3>
                    <p>Descuentos en <span>pantallas y tapas traseras</span>.<br>Válido hasta el 15 de junio para seguidores.</p>
                </div>
            </div>
        </section>

    </div> <!-- Fin app-container -->

    <!-- BOTTOM NAVIGATION (Fijo abajo) -->
    <nav class="bottom-nav">
        <a href="#" class="nav-tab active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>

</body>
