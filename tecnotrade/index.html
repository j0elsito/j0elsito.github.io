<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoTrade | Catálogo iPhone</title>
    <style>
        :root {
            --text-color: #ffffff;
            --text-muted: #a0aec0;
            --accent-color: #A2C4ECE6;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.12);
            --whatsapp-color: #25D366;
            --instagram-color: #E1306C;
            --badge-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        header {
            max-width: 1060px;
            margin: 0 auto;
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-sizing: border-box;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-logo {
            width: 55px;
            height: 55px;
            object-fit: contain;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .social-links {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, opacity 0.2s;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-ws { background-color: var(--whatsapp-color); }
        .btn-ig { background-color: var(--instagram-color); }

        /* Cuadrícula de Catálogo */
        .catalog-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px 80px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .card-header-info {
            padding: 24px 24px 15px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .series-title {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .series-status {
            font-size: 12px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px;
        }

        /* Lista de Variaciones convertidas en enlaces */
        .variants-list {
            padding: 20px 24px 24px 24px;
            display: flex;
            flex-direction: column;
