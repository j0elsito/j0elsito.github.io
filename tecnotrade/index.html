<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoTrade | Catálogo Premium</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #121212;
            --text-color: #ffffff;
            --accent-color: #8E8E93;
            --border-color: #2C2C2E;
            --whatsapp-color: #34C759;
            --instagram-color: #E1306C;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px 20px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0 0 8px 0;
        }

        .subtitle {
            font-size: 14px;
            color: var(--accent-color);
            margin: 0;
        }

        /* Cuadrícula de Productos */
        .catalog-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: #48484A;
        }

        .product-image-placeholder {
            width: 100%;
            height: 280px;
            background-color: #1C1C1E;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            font-size: 14px;
        }

        .product-info {
            padding: 20px;
        }

        .product-sku {
            font-size: 11px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .product-price {
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
        }

        /* Ventana Emergente (Modal de Producto) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 500px;
            border-radius: 24px;
            padding: 32px;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 24px;
            cursor: pointer;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .modal-price {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-description {
            font-size: 14px;
            color: var(--accent-color);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* Botones de Acción */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            display: block;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-color);
            color: white;
        }

        .btn-instagram {
            background-color: #2C2C2E;
            color: white;
            border: 1px solid var(--border-color);
        }

        /* Alerta flotante de copiado */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #1C1C1E;
            border: 1px solid #3A3A3C;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TecnoTrade</div>
        <p class="subtitle">Catálogo Exclusivo de Covers Premium</p>
    </header>

    <div class="catalog-container" id="catalog">
        </div>

    <div class="modal-overlay" id="product-modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="clearHash()">&times;</button>
            <div id="modal-sku" class="product-sku">SKU</div>
            <h2 id="modal-title" class="modal-title">Nombre del Producto</h2>
            <div id="modal-price" class="modal-price">$0.00</div>
            <p id="modal-description" class="modal-description">Descripción detallada.</p>
            
            <div class="action-buttons">
                <a href="#" id="btn-wa" target="_blank" class="btn btn-whatsapp">Pedir por WhatsApp</a>
                <button id="btn-ig" class="btn btn-instagram">Copiar SKU e ir a Instagram</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast-alert">Código de producto copiado al portapapeles</div>

    <script>
        // CONFIGURACIÓN DE TU NEGOCIO (Modifica esto)
        const CONFIG = {
            whatsappPhone: "50760000000", // Reemplaza con tu número (con código de país, sin el +)
            instagramUser: "tu_usuario_ig" // Tu nombre de usuario en Instagram
        };

        // BASE DE DATOS DE TUS 3 PRODUCTOS DE EJEMPLO
        const products = [
            {
                id: "f5666",
                title: "Silicone Case MagSafe",
                price: "$19.99",
                sku: "#COV-F5666",
                description: "Cover de silicona premium con tacto suave, interior de microfibra para evitar rayones y anillo MagSafe magnético integrado perfectamente compatible con carga inalámbrica."
            },
            {
                id: "a3421",
                title: "Leather Luxury Edition",
                price: "$24.99",
                sku: "#COV-A3421",
                description: "Diseño elegante en cuero sintético de alta resistencia. Bordes elevados para proteger la cámara y botones de aluminio anodizado que ofrecen una pulsación premium."
            },
            {
                id: "x9812",
                title: "Crystal Clear Armor",
                price: "$14.99",
                sku: "#COV-X9812",
                description: "Transparencia absoluta con tecnología anti-amarilleo. Esquinas reforzadas con colchón de aire para soportar impactos severos sin perder la estética original de tu equipo."
            }
        ];

        // 1. Renderizar los productos en la cuadrícula
        const catalogContainer = document.getElementById('catalog');
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('onclick', `location.hash = 'producto-${product.id}'`);
            card.innerHTML = `
                <div class="product-image-placeholder">📱 Imagen de Muestra</div>
                <div class="product-info">
                    <div class="product-sku">${product.sku}</div>
                    <h3 class="product-title">${product.title}</h3>
                    <div class="product-price">${product.price}</div>
                </div>
            `;
            catalogContainer.appendChild(card);
        });

        // 2. Manejar la apertura del Modal según la URL (#producto-id)
        const modal = document.getElementById('product-modal');
        
        function checkHash() {
            const hash = window.location.hash;
            if (hash.startsWith('#producto-')) {
                const productId = hash.replace('#producto-', '');
                const product = products.find(p => p.id === productId);
                
                if (product) {
                    openModal(product);
                }
            } else {
                modal.classList.remove('active');
            }
        }

        function openModal(product) {
            document.getElementById('modal-sku').innerText = product.sku;
            document.getElementById('modal-title').innerText = product.title;
            document.getElementById('modal-price').innerText = product.price;
            document.getElementById('modal-description').innerText = product.description;

            // Configurar el enlace dinámico de WhatsApp
            const message = `Hola TecnoTrade, estoy interesado en el producto ${product.title} (${product.sku})`;
            const encodedMessage = encodeURIComponent(message);
            document.getElementById('btn-wa').href = `https://wa.me/${CONFIG.whatsappPhone}?text=${encodedMessage}`;

            // Configurar la acción del botón de Instagram
            const btnIg = document.getElementById('btn-ig');
            btnIg.onclick = function() {
                // Copiar el SKU al portapapeles
                navigator.clipboard.writeText(`Interesado en el producto ${product.sku}`).then(() => {
                    showToast();
                    // Redirigir a Instagram después de un momento
                    setTimeout(() => {
                        window.open(`https://instagram.com/${CONFIG.instagramUser}`, '_blank');
                    }, 1200);
                });
            };

            modal.classList.add('active');
        }

        function closeModal(event) {
            // Cierra el modal si se hace clic fuera del contenido principal
            if(event.target === modal) {
                clearHash();
            }
        }

        function clearHash() {
            window.location.hash = '';
        }

        function showToast() {
            const toast = document.getElementById('toast-alert');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        // Escuchar cambios en la URL
        window.addEventListener('hashchange', checkHash);
        window.addEventListener('load', checkHash);
    </script>
</body>
</html>
