<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TecnoTrade | Inicio</title>
    <style>
        :root {
            --bg-dark: #030509;
            --text-main: #ffffff;
            --text-muted: #86868b;
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-green: #39ff14;
            --neon-cyan: #00ffcc;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(10, 10, 15, 0.95);
        }

        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        .app-container { width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; scrollbar-width: none; }
        .app-container::-webkit-scrollbar { display: none; }

        /* FONDO */
        .motion-bg-container { position: fixed; top: -10px; left: -10px; right: -10px; bottom: -10px; z-index: -2; background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png'); background-size: cover; background-position: center; filter: contrast(1.15) brightness(0.35) blur(4px); pointer-events: none; }

        /* TOP NAVBAR */
        .top-navbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; position: sticky; top: 0; z-index: 100; background: rgba(3,5,9,0.85); backdrop-filter: blur(15px); }
        .nav-icon { width: 26px; height: 26px; fill: #fff; opacity: 0.9; cursor: pointer; }
        .nav-center { display: flex; align-items: center; gap: 10px; }
        .nav-logo-img { width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin: 0; }
        .logo-text span { color: var(--neon-cyan); }

        /* BUSCADOR */
        .search-container { padding: 20px 20px 10px; }
        .search-box { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px 16px; }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; outline: none; }

        /* HERO BANNER */
        .hero-section { padding: 20px; }
        .hero-banner { background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(0,0,0,0.3)); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 24px; padding: 20px; position: relative; overflow: hidden; }
        .hero-title { font-size: 20px; font-weight: 800; margin: 0 0 5px 0; }
        .hero-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; }

        /* CATEGORÍAS */
        .grid-wrapper { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .glass-card { background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 20px; padding: 15px; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; }
        .card-icon { font-size: 24px; margin-bottom: 10px; }

        /* BOTTOM NAVBAR */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0 20px 0; z-index: 1000; }
        .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text-muted); }
        .nav-tab.active { color: var(--neon-cyan); }
        .nav-label { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="motion-bg-container"></div>

    <div class="app-container">
        <!-- TOP NAVBAR -->
        <header class="top-navbar">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            <div class="nav-center">
                <img src="https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/579a1a6e8e73522cf6233557c309824623807b9e/tecnotrade/perfiltecnotrade.png" class="nav-logo-img">
                <h1 class="logo-text">Tecno<span>Trade</span></h1>
            </div>
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </header>

        <!-- BUSCADOR -->
        <div class="search-container">
            <div class="search-box">
                <input type="text" placeholder="Buscar productos...">
            </div>
        </div>

        <!-- HERO -->
        <section class="hero-section">
            <div class="hero-banner">
                <h2 class="hero-title">iPhone 16 Pro</h2>
                <p class="hero-subtitle">Descubre el nuevo diseño.</p>
                <button style="background:white; border:none; padding:8px 16px; border-radius:15px; font-weight:bold;">Comprar</button>
            </div>
        </section>

        <!-- GRID -->
        <div class="grid-wrapper">
            <a href="catalogo.html" class="glass-card">
                <div class="card-icon">📱</div>
                <div style="font-weight:bold;">Equipos</div>
            </a>
            <a href="vender.html" class="glass-card">
                <div class="card-icon">💵</div>
                <div style="font-weight:bold;">Vender</div>
            </a>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-tab active"><span class="card-icon">🏠</span><span class="nav-label">Inicio</span></a>
        <a href="catalogo.html" class="nav-tab"><span class="card-icon">📋</span><span class="nav-label">Catálogo</span></a>
        <a href="#" class="nav-tab"><span class="card-icon">❤️</span><span class="nav-label">Favoritos</span></a>
        <a href="#" class="nav-tab"><span class="card-icon">🛒</span><span class="nav-label">Carrito</span></a>
    </nav>
</body>
</html>
