<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoTrade | Menú</title>
    <style>
        :root {
            --bg-light: #f5f5f7;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
            --glass-card: rgba(255, 255, 255, 0.55);
            --border-glass: rgba(0, 0, 0, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: url('fondoliquidmetal1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* FONDO BLANCO GRISÁCEO TENUE Y BORROSO */
        .glass-overlay {
            background: rgba(245, 245, 247, 0.78);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* CONTENEDOR PRINCIPAL */
        .main-wrapper {
            position: relative;
            z-index: 2;
            width: 92%;
            max-width: 420px;
            text-align: center;
            animation: appEntrance 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* CLASE QUE SE ACTIVA AL TOCAR UN BOTÓN PARA LA TRANSICIÓN DE SALIDA */
        .main-wrapper.fade-out {
            opacity: 0;
            transform: translateY(-20px);
            filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        h1 {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* CONTENEDOR DE CARTAS */
        .cards-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* DISEÑO DE CARTAS DE BARAJA INDIVIDUALES */
        .deck-card {
            background: var(--glass-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 18px 20px;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 10px var(--card-shadow);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        background-color 0.3s ease, 
                        box-shadow 0.3s ease;
        }

        /* EFECTO INTERACTIVO AL PASAR EL DEDO / CURSOR */
        .deck-card:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
        }

        /* CAJA DEL ÍCONO */
        .icon-box {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .card-info {
            text-align: left;
        }

        .card-title {
            display: block;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 2px;
        }

        .card-desc {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* FLECHA INDICADORA ESTILO IOS */
        .arrow-indicator {
            margin-left: auto;
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.5;
            transition: transform 0.
