<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TecnoTrade | Inicio</title>
    <style>
        :root {
            --bg-dark: #030509;
            --text-main: #ffffff;
            --text-glow: #a2c4ec;
            --text-muted: #86868b;
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-green: #39ff14;
            --neon-cyan: #00ffcc;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(10, 10, 15, 0.95);
        }

        /* BLOQUEO TOTAL PARA BARRA FIJA */
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            overflow: hidden; 
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* CAJA DE SCROLL INTERNA */
        .app-container {
            width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 120px; scrollbar-width: none;
        }
        .app-container::-webkit-scrollbar { display: none; }

        /* MATRIZ DE FONDO Y ORBES */
        .motion-bg-container {
            position: fixed; top: -10px; left: -10px; right: -10px; bottom: -10px; z-index: -2;
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png');
            background-size: cover; background-position: center; filter: contrast(1.15) brightness(0.35) blur(4px);
            pointer-events: none;
        }
        .dynamic-aurora {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.05), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(189, 0, 255, 0.05), transparent 50%);
            animation: auroraSpin 20s infinite linear; pointer-events: none;
        }
        @keyframes auroraSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 1. TOP NAVBAR (Igual al catálogo) */
        .top-navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; position: sticky; top: 0; z-index: 100;
            background: linear-gradient(to bottom, rgba(3,5,9,0.95) 0%, rgba(3,5,9,0.8) 60%, rgba(3,5,9,0) 100%);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .nav-icon { width: 26px; height: 26px; fill: #fff; opacity: 0.9; cursor: pointer; }
        .nav-center { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .nav-logo-img { width: 32px; height: 32px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); }
        .logo-text { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin: 0; }
        .logo-text span { color: var(--neon-cyan); }

        /* 2. BUSCADOR INTERACTIVO CON DROPDOWN */
        .search-wrapper { position: relative; padding: 15px 20px; margin-bottom: 5px; z-index: 50; }
        .search-box {
            display: flex; align-items: center; gap: 12px;
            background: var(--card-glass); border: 1px solid var(--border-glass);
            border-radius: 16px; padding: 14px 18px; backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }
        .search-box:focus-within { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        .search-box svg { width: 20px; height: 20px; fill: var(--text-muted); }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 15px; outline: none; }
        .search-box input::placeholder { color: var(--text-muted); }
        
        /* Contenedor de Sugerencias */
        .suggestions-dropdown {
            position: absolute; top: 100%; left: 20px; right: 20px;
            background: rgba(10, 10, 15, 0.95); border: 1px solid var(--border-glass);
            border-radius: 12px; margin-top: 5px; backdrop-filter: blur(20px);
            max-height: 250px; overflow-y: auto; display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .suggestion-item {
            padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px; font-weight: 600; cursor: pointer; color: #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item:active { background: rgba(0, 255, 204, 0.1); color: var(--neon-cyan); }
        .suggestion-arrow { font-size: 10px; color: var(--text-muted); }

        /* 3. HERO BANNER */
        .hero-section { padding: 0 20px; margin-bottom: 25px; }
        .hero-banner {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(0, 0, 0, 0.4) 100%);
            border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 24px; padding: 24px; position: relative; overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .hero-tag { background: #fff; color: #000; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 12px; margin-bottom: 12px; text-transform: uppercase; display: inline-block; }
        .hero-title { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; line-height: 1.1; }
        .hero-subtitle { font-size: 13px; color: var(--text-muted); margin: 0 0 20px 0; max-width: 60%; }
        .hero-btn { background: var(--text-main); color: var(--bg-dark); border: none; border-radius: 20px; padding: 12px 24px; font-size: 13px; font-weight: 800; display: inline-block; text-decoration: none; transition: transform 0.2s; }
        .hero-btn:active { transform: scale(0.95); }
        
        .hero-device {
            position: absolute; right: -20px; bottom: -30px; width: 130px; height: 180px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 2px solid rgba(255,255,255,0.2); border-radius: 25px;
            box-shadow: -10px -10px 30px rgba(0,0,0,0.5); transform: rotate(-5deg);
        }
        .hero-device::after { content: ''; position: absolute; top: 15px; right: 15px; width: 30px; height: 30px; border-radius: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }

        /* 4. CATEGORÍAS (Estilo Catálogo con Vectores) */
        .section-title { font-size: 16px; font-weight: 700; padding: 0 20px; margin-bottom: 12px; }
        .grid-wrapper { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 20px; }
        
        .glass-card {
            background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 24px;
            padding: 16px; text-decoration: none; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); transition: transform 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .glass-card:active { transform: scale(0.95); background: rgba(255,255,255,0.06); }

        /* Vectores */
        .image-visual-space { width: 100%; height: 80px; background: rgba(255,255,255,0.01); border-radius: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
        .vector-icon { position: relative; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(255,255,255,0.15); display: flex; justify-content: center; align-items: center; transform: scale(0.65); }
        
        .v-phone { width: 55px; height: 100px; border-radius: 14px; }
        .v-phone::before { content:''; position:absolute; top:8px; left:8px; width:15px; height:25px; border:2px solid rgba(255,255,255,0.15); border-radius:6px; }
        .v-cash { width: 90px; height: 50px; border-radius: 10px; }
        .v-cash::before { content:'$'; position:absolute; font-size: 20px; font-weight: bold; color: rgba(255,255,255,0.4); }
        .v-cash::after { content:''; position:absolute; width: 30px; height: 30px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 50%; }
        
        .card-title { font-size: 14px; font-weight: 800; margin: 0; text-align: center; }

        /* 5. BOTTOM NAVBAR FIJA */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 12px 0 20px 0; 
            z-index: 10000;
        }
        .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text-muted); position: relative; }
        .nav-tab.active { color: var(--neon-cyan); }
        .nav-tab svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-label { font-size: 10px; font-weight: 600; }
        .cart-badge { position: absolute; top: -4px; right: -4px; background: #ff3b30; color: #fff; font-size: 9px; font-weight: 800; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg-dark); }
    </style>
</head>
<body>

    <div class="motion-bg-container"></div>
    <div class="dynamic-aurora"></div>

    <div class="app-container">
        
        <!-- TOP NAVBAR (Unificada) -->
        <header class="top-navbar">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            <div class="nav-center">
                <img src="https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/579a1a6e8e73522cf6233557c309824623807b9e/tecnotrade/perfiltecnotrade.png" class="nav-logo-img" alt="Logo">
                <h1 class="logo-text">Tecno<span>Trade</span></h1>
            </div>
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </header>

        <!-- BUSCADOR CON LÓGICA -->
        <div class="search-wrapper">
            <div class="search-box">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar modelo (ej: 15 Pro Max)..." autocomplete="off">
            </div>
            <!-- Aquí aparecerán los resultados -->
            <div id="suggestionsBox" class="suggestions-dropdown"></div>
        </div>

        <!-- HERO BANNER -->
        <section class="hero-section">
            <div class="hero-banner">
                <span class="hero-tag">Destacado</span>
                <h2 class="hero-title">iPhone 16 Pro</h2>
                <p class="hero-subtitle">Descubre el nuevo diseño y usa tu equipo como abono.</p>
                <a href="catalogo.html#iphone-16-pro" class="hero-btn">Comprar ahora</a>
                <div class="hero-device"></div>
            </div>
        </section>

        <!-- CATEGORÍAS RÁPIDAS -->
        <div class="section-title">Categorías</div>
        <div class="grid-wrapper">
            <a href="catalogo.html" class="glass-card">
                <div class="image-visual-space"><div class="vector-icon v-phone"></div></div>
                <h2 class="card-title">Equipos</h2>
            </a>
            <a href="vender.html" class="glass-card">
                <div class="image-visual-space"><div class="vector-icon v-cash"></div></div>
                <h2 class="card-title">Vender</h2>
            </a>
        </div>
        
    </div> <!-- Fin app-container -->

    <!-- BOTTOM NAVBAR -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-tab active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">Inicio</span>
        </a>
        <a href="catalogo.html" class="nav-tab">
            <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            <span class="nav-label">Catálogo</span>
        </a>
        <a href="#" class="nav-tab">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span class="nav-label">Favoritos</span>
        </a>
        <a href="#" class="nav-tab">
            <div class="cart-badge">2</div>
            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span class="nav-label">Carrito</span>
        </a>
    </nav>

    <!-- LÓGICA DEL BUSCADOR INTELIGENTE -->
    <script>
        // Base de datos exacta conectada a los IDs del catalogo.html
        const inventory = [
            { name: "Samsung Galaxy", id: "android-samsung" },
            { name: "Honor", id: "android-honor" },
            { name: "Xiaomi", id: "android-xiaomi" },
            { name: "Google Pixel", id: "android-pixel" },
            { name: "Redmi", id: "android-redmi" },
            { name: "iPhone 17", id: "iphone-17" },
            { name: "iPhone 17 Plus", id: "iphone-17-plus" },
            { name: "iPhone 17 Pro", id: "iphone-17-pro" },
            { name: "iPhone 17 Pro Max", id: "iphone-17-pro-max" },
            { name: "iPhone 16", id: "iphone-16" },
            { name: "iPhone 16 Plus", id: "iphone-16-plus" },
            { name: "iPhone 16 Pro", id: "iphone-16-pro" },
            { name: "iPhone 16 Pro Max", id: "iphone-16-pro-max" },
            { name: "iPhone 15", id: "iphone-15" },
            { name: "iPhone 15 Plus", id: "iphone-15-plus" },
            { name: "iPhone 15 Pro", id: "iphone-15-pro" },
            { name: "iPhone 15 Pro Max", id: "iphone-15-pro-max" },
            { name: "iPhone 14", id: "iphone-14" },
            { name: "iPhone 14 Plus", id: "iphone-14-plus" },
            { name: "iPhone 14 Pro", id: "iphone-14-pro" },
            { name: "iPhone 14 Pro Max", id: "iphone-14-pro-max" },
            { name: "iPhone 13 Mini", id: "iphone-13-mini" },
            { name: "iPhone 13", id: "iphone-13" },
            { name: "iPhone 13 Pro", id: "iphone-13-pro" },
            { name: "iPhone 13 Pro Max", id: "iphone-13-pro-max" },
            { name: "iPhone 12 Mini", id: "iphone-12-mini" },
            { name: "iPhone 12", id: "iphone-12" },
            { name: "iPhone 12 Pro", id: "iphone-12-pro" },
            { name: "iPhone 12 Pro Max", id: "iphone-12-pro-max" },
            { name: "iPhone 11", id: "iphone-11" },
            { name: "iPhone 11 Pro", id: "iphone-11-pro" },
            { name: "iPhone 11 Pro Max", id: "iphone-11-pro-max" }
        ];

        const searchInput = document.getElementById('searchInput');
        const suggestionsBox = document.getElementById('suggestionsBox');

        // Escuchar cada tecla que el usuario presione
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            suggestionsBox.innerHTML = ''; // Limpiar resultados anteriores

            if (query.length > 0) {
                // Filtrar el inventario (busca si el nombre incluye lo que el usuario escribió)
                const filtered = inventory.filter(item => item.name.toLowerCase().includes(query));

                if (filtered.length > 0) {
                    suggestionsBox.style.display = 'block'; // Mostrar la caja
                    
                    filtered.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        // Texto a la izquierda, flecha a la derecha
                        div.innerHTML = `<span>${item.name}</span> <span class="suggestion-arrow">▶</span>`;
                        
                        // Acción al tocar la sugerencia: Ir al catálogo con el ID en el link
                        div.onclick = function() {
                            window.location.href = `catalogo.html#${item.id}`;
                        };
                        suggestionsBox.appendChild(div);
                    });
                } else {
                    // Si no hay resultados
                    suggestionsBox.style.display = 'block';
                    suggestionsBox.innerHTML = `<div class="suggestion-item" style="color: #86868b; text-align:center;">No se encontraron modelos</div>`;
                }
            } else {
                suggestionsBox.style.display = 'none'; // Ocultar si está vacío
            }
        });

        // Ocultar sugerencias si toca fuera del buscador
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });
    </script>
</body>
</html>
