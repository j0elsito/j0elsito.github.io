<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoTrade | Menú</title>
    <style>
        :root {
            --bg-light: #f5f5f7;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
            --glass-card: rgba(255, 255, 255, 0.55);
            --border-glass: rgba(0, 0, 0, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* URL absoluta directa para evitar que GitHub tumbe la página con un 404 */
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* FONDO BLANCO GRISÁCEO TENUE Y BORROSO */
        .glass-overlay {
            background: rgba(245, 245, 247, 0.78);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* CONTENEDOR PRINCIPAL */
        .main-wrapper {
            position: relative;
            z-index: 2;
            width: 92%;
            max-width: 420px;
            text-align: center;
            animation: appEntrance 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* TRANSICIÓN DE SALIDA */
        .main-wrapper.fade-out {
            opacity: 0;
            transform: translateY(-20px);
            filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        h1 {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* CONTENEDOR DE CARTAS */
        .cards-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* DISEÑO DE CARTAS DE BARAJA INDIVIDUALES */
        .deck-card {
            background: var(--glass-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 18px 20px;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 10px var(--card-shadow);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        background-color 0.3s ease, 
                        box-shadow 0.3s ease;
        }

        .deck-card:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.06);
        }

        .icon-box {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .card-info {
            text-align: left;
        }

        .card-title {
            display: block;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            margin-bottom: 2px;
        }

        .card-desc {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
        }

        .arrow-indicator {
            margin-left: auto;
            font-size: 14px;
            color: var(--text-muted);
            opacity: 0.5;
            transition: transform 0.3s ease;
        }
        .deck-card:hover .arrow-indicator {
            transform: translateX(3px);
            opacity: 1;
        }

        /* ICONOS FINALES EN LA BASE */
        .minimal-footer {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 30px;
            z-index: 2;
        }

        .social-icon {
            width: 24px;
            height: 24px;
            opacity: 0.4;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .social-icon:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        @keyframes appEntrance {
            from { opacity: 0; transform: translateY(15px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>

    <div class="glass-overlay"></div>

    <div class="main-wrapper" id="menu-container">
        <h1>TecnoTrade</h1>
        <p class="tagline">Selecciona una categoría para continuar</p>
        
        <div class="cards-stack">
            <!-- OPCIÓN 1: COMPRAR TELÉFONO -->
            <a href="catalogo.html" class="deck-card nav-link">
                <div class="icon-box">📱</div>
                <div class="card-info">
                    <span class="card-title">Comprar Teléfono</span>
                    <span class="card-desc">Equipos con garantía garantizada</span>
                </div>
                <span class="arrow-indicator">➔</span>
            </a>

            <!-- OPCIÓN 2: VENDER EQUIPO -->
            <a href="vender.html" class="deck-card nav-link">
                <div class="icon-box">💵</div>
                <div class="card-info">
                    <span class="card-title">Vender mi dispositivo</span>
                    <span class="card-desc">Usa tu equipo actual como abono</span>
                </div>
                <span class="arrow-indicator">➔</span>
            </a>

            <!-- OPCIÓN 3: REPARAR EQUIPO -->
            <a href="reparar.html" class="deck-card nav-link">
                <div class="icon-box">🔧</div>
                <div class="card-info">
                    <span class="card-title">Reparar equipo</span>
                    <span class="card-desc">Pantallas, baterías y servicio técnico</span>
                </div>
                <span class="arrow-indicator">➔</span>
            </a>

            <!-- OPCIÓN 4: LAPTOPS Y SISTEMAS -->
            <a href="laptops.html" class="deck-card nav-link">
                <div class="icon-box">💻</div>
                <div class="card-info">
                    <span class="card-title">Laptops & Sistemas</span>
                    <span class="card-desc">Mantenimiento y cambio de sistemas</span>
                </div>
                <span class="arrow-indicator">➔</span>
            </a>
        </div>
    </div>

    <div class="minimal-footer">
        <a href="https://wa.me/50767966691" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png" class="social-icon" alt="WhatsApp">
        </a>
        <a href="https://www.instagram.com/tecnotradepty/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="social-icon" alt="Instagram">
        </a>
    </div>

    <script>
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                const destination = this.getAttribute('href');
                e.preventDefault();
                document.getElementById('menu-container').classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = destination;
                }, 400);
            });
        });
    </script>
</body>
</html>
