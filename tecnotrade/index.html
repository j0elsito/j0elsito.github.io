<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoTrade | Catálogo Premium</title>
    <style>
        :root {
            --text-color: #ffffff;
            --accent-color: #A2C4ECE6;
            --card-bg: rgba(0, 0, 0, 0.65);
            --border-color: rgba(255, 255, 255, 0.15);
            --whatsapp-color: #25D366;
            --instagram-color: #4A5568;
            --promo-color: #38bdf8; /* Color azul celeste destacado para el gancho comercial */
        }

        body {
            margin: 0;
            padding: 0;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        header {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .brand-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 14px;
            color: var(--accent-color);
            margin: 0;
        }

        /* Cuadrícula de Productos */
        .catalog-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
