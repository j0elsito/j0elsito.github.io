<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoTrade | Catálogo Premium</title>
    <style>
        :root {
            --text-color: #ffffff;
            --text-muted: #a0aec0;
            --accent-color: #A2C4ECE6;
            --card-bg: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.12);
            --whatsapp-color: #25D366;
            --instagram-color: #E1306C;
            --promo-color: #38bdf8; 
        }

        body {
            margin: 0;
            padding: 0;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Navbar / Header */
        header {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .brand-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            background: rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Redes Sociales Header */
        .social-links {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .social-btn {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, opacity 0.2s;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-ws { background-color: var(--whatsapp-color); }
        .btn-ig { background-color: var(--instagram-color); }

        /* Cuadrícula de Productos */
        .catalog-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px 60px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Aspect Ratio 1:1 */
            background: rgba(255, 255, 255, 0.03);
        }
