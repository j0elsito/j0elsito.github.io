<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TecnoTrade | Welcome</title>
    <style>
        :root {
            --bg-dark: #030509;
            --text-main: #ffffff;
            --text-glow: #a2c4ec;
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-green: #39ff14;
            --neon-cyan: #00ffcc;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        html { width: 100%; height: 100%; overflow: hidden; }

        body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            overscroll-behavior: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1500px; /* Profundidad 3D aumentada */
        }

        /* 1. FONDO VIVO: METAL LÍQUIDO + NEBLINA EN MOVIMIENTO */
        .motion-bg-container {
            position: fixed;
            top: -5%; left: -5%; width: 110%; height: 110%;
            z-index: -3;
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/680c8da89e3ff6c3d44033e078884bb680694e01/tecnotrade/fondoliquidmetal1.png');
            background-size: cover;
            background-position: center;
            filter: contrast(1.2) brightness(0.35) blur(3px);
            pointer-events: none;
            animation: bgBreathe 10s infinite alternate ease-in-out;
        }

        /* Capa de luces cambiantes superpuesta al metal */
        .dynamic-aurora {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.05), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(189, 0, 255, 0.05), transparent 50%);
            animation: auroraSpin 20s infinite linear;
            pointer-events: none;
        }

        /* 2. HEADER CON PULSO Y JERGA PANAMEÑA */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
            margin-top: 20px;
            animation: dropDownLogo 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header-section img {
            width: 75px; height: 75px;
            border-radius: 24px;
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
            margin-bottom: 12px;
            animation: pulseGlow 3s infinite alternate;
        }

        .header-section h1 {
            font-size: 38px; font-weight: 900; letter-spacing: -1px; margin: 0;
            background: linear-gradient(90deg, #fff, #e2e8f0, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* El toque local elegante */
        .panama-slang {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
            margin-top: 8px;
            max-width: 280px;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }
        .panama-slang span { color: var(--neon-cyan); font-weight: 700; }

        /* 3. CUADRÍCULA 2x2 EXAGERADA */
        .grid-wrapper {
            width: 90%; max-width: 480px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            z-index: 10;
            padding-bottom: 90px;
        }

        /* TARJETAS CON EFECTO SHIMMER Y 3D */
        .glass-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            aspect-ratio: 1 / 1.1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text-main);
            position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02), 0 15px 35px rgba(0,0,0,0.4);
            opacity: 0; transform-style: preserve-3d;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Coreografía de entrada 3D en cascada */
        .glass-card { animation: card3DEntrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .glass-card:nth-child(1) { animation-delay: 0.1s; }
        .glass-card:nth-child(2) { animation-delay: 0.25s; }
        .glass-card:nth-child(3) { animation-delay: 0.4s; }
        .glass-card:nth-child(4) { animation-delay: 0.55s; }

        /* Reflejo de luz pasando por la tarjeta infinitamente */
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            animation: lightSweep 6s infinite;
        }

        /* Explosión táctil */
        .glass-card:active { transform: scale(0.92) translateZ(-20px); }

        /* 4. ÍCONOS LEVITANDO */
        .image-visual-space {
            width: 80%; height: 50%;
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .vector-icon {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255,255,255,0.15);
            display: flex; justify-content: center; align-items: center;
            transform: scale(0.7);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            /* Cada ícono levita a su propio ritmo */
            animation: floatAmbient 4s ease-in-out infinite alternate;
        }
        
        .card-buy .vector-icon { animation-delay: 0s; }
        .card-sell .vector-icon { animation-delay: 1s; }
        .card-repair .vector-icon { animation-delay: 2s; }
        .card-laptop .vector-icon { animation-delay: 3s; }

        /* VECTORES */
        .v-phone { width: 55px; height: 100px; border-radius: 14px; }
        .v-phone::before { content:''; position:absolute; top:8px; left:8px; width:15px; height:25px; border:2px solid rgba(255,255,255,0.15); border-radius:6px; }
        
        .v-cash { width: 90px; height: 50px; border-radius: 10px; }
        .v-cash::before { content:'$'; position:absolute; font-size: 20px; font-weight: bold; color: rgba(255,255,255,0.4); }
        .v-cash::after { content:''; position:absolute; width: 30px; height: 30px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 50%; }

        .v-repair { width: 60px; height: 70px; border-radius: 10px; border-style: dashed; }
        .v-repair::before { content:'⚙'; position:absolute; font-size: 28px; color: rgba(255,255,255,0.4); }

        .v-laptop { width: 90px; height: 55px; border-radius: 6px 6px 0 0; border-bottom: 8px solid rgba(255,255,255,0.2); }
        .v-laptop::before { content:''; position:absolute; top: 5px; width: 70px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-radius: 4px; }

        /* Colores Neón al Tocar */
        .card-buy:active { border-color: var(--neon-blue); box-shadow: 0 0 40px rgba(0, 240, 255, 0.4); }
        .card-buy:active .vector-icon { border-color: var(--neon-blue); background: rgba(0,240,255,0.15); }
        
        .card-sell:active { border-color: var(--neon-green); box-shadow: 0 0 40px rgba(57, 255, 20, 0.4); }
        .card-sell:active .vector-icon { border-color: var(--neon-green); background: rgba(57,255,20,0.15); }
        .card-sell:active .v-cash::before { color: var(--neon-green); }

        .card-repair:active { border-color: var(--neon-purple); box-shadow: 0 0 40px rgba(189, 0, 255, 0.4); }
        .card-repair:active .vector-icon { border-color: var(--neon-purple); background: rgba(189,0,255,0.15); }
        .card-repair:active .v-repair::before { color: var(--neon-purple); }

        .card-laptop:active { border-color: var(--neon-cyan); box-shadow: 0 0 40px rgba(0, 255, 204, 0.4); }
        .card-laptop:active .vector-icon { border-color: var(--neon-cyan); border-bottom-color: var(--neon-cyan); background: rgba(0,255,204,0.15); }

        /* TÍTULOS */
        .card-title {
            font-size: 15px; font-weight: 800; text-align: center; margin: 0; line-height: 1.2; padding: 0 5px;
            text-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }

        /* 5. REDES SOCIALES + UBICACIÓN */
        .social-bar {
            position: fixed; bottom: 30px;
            display: flex; gap: 35px; align-items: center;
            z-index: 20;
            animation: fadeInUP 1s 0.8s forwards; opacity: 0;
        }

        .social-btn {
            display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .social-btn img { width: 20px; filter: invert(1); opacity: 0.8; }
