<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TecnoTrade | Dashboard</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-color: #030509;
            perspective: 1200px;
        }

        /* FONDO FIJO QUE NO SE MUEVE CON EL ZOOM NI EL REDIMENSIONADO */
        .motion-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/579a1a6e8e73522cf6233557c309824623807b9e/tecnotrade/fondoliquidmetal1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: contrast(1.1) brightness(0.4);
        }

        /* ORBES (Sin porcentajes que se rompan) */
        .neon-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
        }
        .orb-1 { width: 40vh; height: 40vh; background: #00f0ff; top: 10%; left: 10%; }
        .orb-2 { width: 40vh; height: 40vh; background: #bd00ff; bottom: 10%; right: 10%; }

        /* Dashboard igual al del catálogo */
        .dashboard-wrapper {
            width: 90%;
            max-width: 440px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section h1 { font-size: 38px; font-weight: 900; margin-bottom: 5px; }
        .header-section p { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        .tilt-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .tilt-card:active { transform: scale(0.97); }

        .card-icon {
            font-size: 28px;
            background: rgba(255,255,255,0.05);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .card-subtitle { font-size: 13px; color: var(--text-muted); }

        .social-bar {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 30px;
        }

        .social-icon { width: 25px; filter: invert(1); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="motion-bg-container"></div>
    <div class="neon-orb orb-1"></div>
    <div class="neon-orb orb-2"></div>

    <div class="dashboard-wrapper">
        <div class="header-section">
            <h1>TecnoTrade</h1>
            <p>Dashboard de servicios</p>
        </div>

        <a href="catalogo.html" class="tilt-card">
            <div class="card-icon">📱</div>
            <div class="card-text">
                <div class="card-title">Comprar Teléfono</div>
                <div class="card-subtitle">Catálogo premium de equipos</div>
            </div>
        </a>

        <a href="vender.html" class="tilt-card">
            <div class="card-icon">💵</div>
            <div class="card-text">
                <div class="card-title">Vender mi dispositivo</div>
                <div class="card-subtitle">Trade-in inmediato</div>
            </div>
        </a>

        <a href="reparar.html" class="tilt-card">
            <div class="card-icon">🔧</div>
            <div class="card-text">
                <div class="card-title">Servicio Técnico</div>
                <div class="card-subtitle">Reparaciones garantizadas</div>
            </div>
        </a>

        <a href="laptops.html" class="tilt-card">
            <div class="card-icon">💻</div>
            <div class="card-text">
                <div class="card-title">Laptops & Sistemas</div>
                <div class="card-subtitle">Mantenimiento y software</div>
            </div>
        </a>
    </div>

    <div class="social-bar">
        <a href="https://wa.me/50767966691"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png" class="social-icon"></a>
        <a href="https://www.instagram.com/tecnotradepty/"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" class="social-icon"></a>
    </div>

</body>
</html>
