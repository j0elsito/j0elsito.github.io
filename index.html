<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TecnoTrade | Inicio</title>
    <style>
        :root {
            --bg-dark: #030509;
            --text-main: #ffffff;
            --text-glow: #a2c4ec;
            --text-muted: #86868b;
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-green: #39ff14;
            --neon-cyan: #00ffcc;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(10, 10, 15, 0.95);
        }

        /* RESET Y BLOQUEO DE SCROLL GLOBAL */
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            overflow: hidden; 
            background-color: transparent; /* CORRECCIÓN: Fondo transparente para no tapar la imagen */
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* CAPA DE TRANSICIÓN DE PÁGINA (Efecto App) */
        .page-transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); z-index: 99999;
            transition: opacity 0.4s ease-in-out; pointer-events: none; opacity: 1;
        }

        /* CAJA DE SCROLL INTERNA */
        .app-container {
            width: 100%; height: 100vh; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 120px; scrollbar-width: none; scroll-behavior: smooth;
            position: relative; z-index: 10; /* CORRECCIÓN: Mantiene el contenido por encima del fondo */
        }
        .app-container::-webkit-scrollbar { display: none; }

        /* FONDO INTERACTIVO 100% VISIBLE Y NÍTIDO */
        .motion-bg-container {
            position: fixed; top: -20px; left: -20px; right: -20px; bottom: -20px; 
            z-index: 0; /* CORRECCIÓN: Capa base correcta */
            background-image: url('https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/4e90195cfb8c2a54007fa1a3b3f68ee0a5b2725c/chatliquidmetal1.png');
            background-size: cover; background-position: center; 
            filter: contrast(1.1) brightness(0.65); /* CORRECCIÓN: Sin blur y con mejor brillo */
            pointer-events: none;
            animation: bgBreathe 15s infinite alternate ease-in-out;
        }
        @keyframes bgBreathe { 
            0% { transform: scale(1); filter: contrast(1.1) brightness(0.60); } 
            100% { transform: scale(1.05); filter: contrast(1.15) brightness(0.70); } 
        }

        .dynamic-aurora {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; 
            z-index: 1; /* CORRECCIÓN: Entre el fondo y el contenido */
            background: radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.05), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(189, 0, 255, 0.05), transparent 50%);
            animation: auroraSpin 25s infinite linear; pointer-events: none;
        }
        @keyframes auroraSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* TOP NAVBAR */
        .top-navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; position: sticky; top: 0; z-index: 100;
            background: linear-gradient(to bottom, rgba(3,5,9,0.95) 0%, rgba(3,5,9,0.7) 70%, rgba(3,5,9,0) 100%);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transform: translateY(-20px); opacity: 0; animation: slideDown 0.6s 0.2s forwards ease-out;
        }
        @keyframes slideDown { to { transform: translateY(0); opacity: 1; } }
        
        .nav-icon { width: 26px; height: 26px; fill: #fff; opacity: 0.9; cursor: pointer; transition: transform 0.2s; }
        .nav-icon:active { transform: scale(0.8); }
        .nav-center { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .nav-logo-img { width: 34px; height: 34px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
        .logo-text { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; margin: 0; }
        .logo-text span { color: var(--neon-cyan); }

        /* BUSCADOR INTERACTIVO */
        .search-wrapper { position: relative; padding: 15px 20px; margin-bottom: 5px; z-index: 90; opacity: 0; animation: fadeIn 0.8s 0.4s forwards; }
        .search-box {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border-glass);
            border-radius: 18px; padding: 14px 18px; backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .search-box:focus-within { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0, 255, 204, 0.15); background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .search-box svg { width: 20px; height: 20px; fill: var(--text-muted); transition: fill 0.3s; }
        .search-box:focus-within svg { fill: var(--neon-cyan); }
        .search-box input { background: transparent; border: none; color: #fff; width: 100%; font-size: 15px; font-weight: 500; outline: none; }
        .search-box input::placeholder { color: var(--text-muted); font-weight: 400; }
        
        /* Dropdown de Sugerencias */
        .suggestions-dropdown {
            position: absolute; top: calc(100% - 10px); left: 20px; right: 20px;
            background: rgba(10, 10, 15, 0.95); border: 1px solid var(--border-glass);
            border-radius: 16px; padding: 8px 0; backdrop-filter: blur(20px);
            max-height: 280px; overflow-y: auto; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .suggestion-item {
            padding: 14px 20px; font-size: 14px; font-weight: 600; cursor: pointer; color: #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s, padding-left 0.2s;
        }
        .suggestion-item:hover, .suggestion-item:active { background: rgba(0, 255, 204, 0.1); color: var(--neon-cyan); padding-left: 26px; }
        .suggestion-arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
        .suggestion-item:hover .suggestion-arrow { color: var(--neon-cyan); transform: translateX(5px); }

        /* HERO BANNER */
        .hero-section { padding: 0 20px; margin-bottom: 25px; opacity: 0; animation: fadeInUp 0.8s 0.5s forwards; }
        .hero-banner {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(0, 0, 0, 0.4) 100%);
            border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 28px; padding: 28px 24px; position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .hero-tag { background: #fff; color: #000; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 12px; margin-bottom: 14px; text-transform: uppercase; display: inline-block; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .hero-title { font-size: 26px; font-weight: 900; margin: 0 0 8px 0; letter-spacing: -0.5px; }
        .hero-subtitle { font-size: 13px; color: var(--text-muted); margin: 0 0 24px 0; max-width: 65%; line-height: 1.4; }
        .hero-btn { 
            background: var(--text-main); color: var(--bg-dark); border: none; border-radius: 20px; 
            padding: 12px 24px; font-size: 13px; font-weight: 800; display: inline-block; 
            text-decoration: none; transition: all 0.2s; box-shadow: 0 8px 20px rgba(255,255,255,0.2);
        }
        .hero-btn:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(255,255,255,0.1); }
        
        .hero-device {
            position: absolute; right: -25px; bottom: -40px; width: 140px; height: 190px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.01));
            border: 2px solid rgba(255,255,255,0.2); border-radius: 28px;
            box-shadow: -15px -15px 40px rgba(0,0,0,0.5); transform: rotate(-8deg);
        }
        .hero-device::after { content: ''; position: absolute; top: 18px; right: 18px; width: 35px; height: 35px; border-radius: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }

        /* GRID CATEGORÍAS 2x2 */
        .section-title { font-size: 18px; font-weight: 800; padding: 0 20px; margin-bottom: 16px; opacity: 0; animation: fadeIn 0.8s 0.6s forwards; }
        .grid-wrapper { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 20px; opacity: 0; animation: fadeInUp 0.8s 0.7s forwards; }
        
        .glass-card {
            background: var(--card-glass); border: 1px solid var(--border-glass); border-radius: 24px;
            padding: 20px 16px; text-decoration: none; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .glass-card:active { transform: scale(0.93); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }

        /* VECTORES CSS PUROS DE ALTA CALIDAD */
        .image-visual-space { width: 100%; height: 75px; background: rgba(255,255,255,0.02); border-radius: 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; }
        .vector-icon { position: relative; display: flex; justify-content: center; align-items: center; transform: scale(0.7); }
        
        /* Icono Teléfono */
        .v-phone { width: 55px; height: 100px; border-radius: 14px; background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .v-phone::before { content:''; position:absolute; top:8px; left:8px; width:15px; height:25px; border:2px solid rgba(255,255,255,0.15); border-radius:6px; }
        
        /* Icono Vender (Billete/Caja fuerte) */
        .v-cash { width: 85px; height: 50px; border-radius: 10px; background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .v-cash::before { content:'$'; position:absolute; font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.5); }
        .v-cash::after { content:''; position:absolute; width: 34px; height: 34px; border: 2px dashed rgba(255,255,255,0.3); border-radius: 50%; }

        /* Icono Reparar (Engranaje) */
        .v-repair { width: 56px; height: 56px; border-radius: 50%; background: rgba(0, 0, 0, 0.5); border: 4px dashed rgba(255,255,255,0.2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.5); animation: rotateSlow 10s linear infinite; }
        .v-repair::after { content:''; position:absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
        @keyframes rotateSlow { 100% { transform: scale(0.7) rotate(360deg); } }

        /* Icono Laptops */
        .v-laptop { width: 90px; height: 55px; border-radius: 8px 8px 0 0; background: rgba(0, 0, 0, 0.5); border: 2px solid rgba(255,255,255,0.2); border-bottom: 8px solid rgba(255,255,255,0.4); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .v-laptop::before { content:''; position:absolute; top: 6px; width: 74px; height: 38px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; background: rgba(255,255,255,0.02); }

        .card-title { font-size: 15px; font-weight: 800; margin: 0; text-align: center; letter-spacing: -0.2px; }

        /* BOTTOM NAVBAR FIJA */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--nav-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; padding: 14px 0 24px 0; 
            z-index: 10000; transform: translateY(100%); animation: slideUp 0.6s 0.8s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp { to { transform: translateY(0);
