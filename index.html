<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TecnoTrade | Inicio</title>
    <style>
        :root {
            /* PALETA MACSTORE (Light Theme Premium) */
            --bg-light: #f5f5f7; /* El fondo gris oficial de Apple */
            --text-main: #1d1d1f; /* Negro suave para lectura perfecta */
            --text-muted: #86868b;
            --brand-blue: #0071e3; /* Azul oficial de botones de Apple */
            --card-glass: rgba(255, 255, 255, 0.85); /* Cristal blanco translúcido */
            --border-glass: rgba(0, 0, 0, 0.05); /* Bordes casi invisibles */
            --nav-bg: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        /* 1. RESET Y SCROLL NATURAL */
        html, body {
            margin: 0; padding: 0;
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* 2. FONDO INTERACTIVO CLARO (Esferas Pastel 100% CSS) */
        .css-interactive-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3;
            background-color: var(--bg-light); overflow: hidden;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.7;
            animation: floatOrb 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Tonos muy suaves para no distraer del contenido */
        .orb-1 { width: 50vw; height: 50vw; background: rgba(0, 113, 227, 0.12); top: -10%; left: -10%; }
        .orb-2 { width: 55vw; height: 55vw; background: rgba(0, 198, 214, 0.1); bottom: -20%; right: -10%; animation-delay: -5s; animation-duration: 25s; }
        .orb-3 { width: 45vw; height: 45vw; background: rgba(189, 0, 255, 0.06); top: 30%; left: 30%; animation-delay: -10s; animation-duration: 30s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(8vw, 8vh) scale(1.05); }
            100% { transform: translate(-4vw, 4vh) scale(0.95); }
        }

        /* CAPA DE TRANSICIÓN (Blanco Puro) */
        .page-transition-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff; z-index: 99999;
            transition: opacity 0.4s ease-in-out; pointer-events: none; opacity: 1;
        }

        /* 3. CONTENEDOR PRINCIPAL */
        .app-wrapper {
            width: 100%; margin: 0 auto; padding-bottom: 120px;
            position: relative; z-index: 10;
        }

        /* TOP NAVBAR (Estilo Claro) */
        .top-navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; position: sticky; top: 0; z-index: 100;
            background: linear-gradient(to bottom, rgba(245,245,247,0.95) 0%, rgba(245,245,247,0.6) 80%, transparent 100%);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .nav-icon { width: 26px; height: 26px; fill: var(--text-main); cursor: pointer; transition: transform 0.2s; }
        .nav-icon:active { transform: scale(0.8); }
        .nav-center { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-logo-img { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border-glass); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .logo-text { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; margin: 0; color: var(--text-main); }
        .logo-text span { color: var(--brand-blue); font-weight: 900; }

        /* BUSCADOR INTERACTIVO */
        .search-wrapper { position: relative; padding: 10px 20px 20px; z-index: 90; }
        .search-box {
            display: flex; align-items: center; gap: 12px;
            background: var(--card-glass); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 14px 18px; 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease; box-shadow: var(--shadow-soft);
        }
        .search-box:focus-within { border-color: var(--brand-blue); box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15); transform: translateY(-2px); }
        .search-box svg { width: 20px; height: 20px; fill: var(--text-muted); transition: fill 0.3s; }
        .search-box:focus-within svg { fill: var(--brand-blue); }
        .search-box input { background: transparent; border: none; color: var(--text-main); width: 100%; font-size: 15px; font-weight: 500; outline: none; }
        .search-box input::placeholder { color: var(--text-muted); font-weight: 400; }
        
        .suggestions-dropdown {
            position: absolute; top: calc(100% - 15px); left: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.98); border: 1px solid var(--border-glass);
            border-radius: 16px; padding: 8px 0; backdrop-filter: blur(25px);
            max-height: 280px; overflow-y: auto; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .suggestion-item {
            padding: 14px 20px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s; border-bottom: 1px solid var(--border-glass);
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item:active { background: rgba(0, 113, 227, 0.05); color: var(--brand-blue); padding-left: 26px; }
        .suggestion-arrow { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
        .suggestion-item:hover .suggestion-arrow { color: var(--brand-blue); transform: translateX(5px); }

        /* HERO BANNER (Estilo MacStore) */
        .hero-section { padding: 0 20px; margin-bottom: 30px; }
        .hero-banner {
            background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
            border: 1px solid #ffffff; border-radius: 28px; padding: 28px 24px; position: relative; overflow: hidden;
            box-shadow: var(--shadow-soft);
        }
        .hero-content { position: relative; z-index: 2; }
        .hero-tag { background: var(--brand-blue); color: #fff; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 12px; margin-bottom: 14px; text-transform: uppercase; display: inline-block; }
        .hero-title { font-size: 28px; font-weight: 900; margin: 0 0 8px 0; letter-spacing: -0.5px; color: var(--text-main); }
        .hero-subtitle { font-size: 13px; color: #555; margin: 0 0 24px 0; max-width: 65%; line-height: 1.4; }
        .hero-btn { 
            background: var(--brand-blue); color: #fff; border: none; border-radius: 20px; 
            padding: 12px 24px; font-size: 13px; font-weight: 800; display: inline-block; 
            text-decoration: none; transition: all 0.2s; box-shadow: 0 8px 20px rgba(0, 113, 227, 0.25);
        }
        .hero-btn:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(0, 113, 227, 0.15); }
        
        /* Teléfono del Hero (Silueta Blanca/Plata) */
        .hero-device {
            position: absolute; right: -25px; bottom: -40px; width: 140px; height: 190px;
            background: linear-gradient(180deg, #ffffff, #e5e5ea);
            border: 4px solid #ffffff; border-radius: 28px;
            box-shadow: -15px -15px 30px rgba(0,0,0,0.06); transform: rotate(-8deg); z-index: 1;
        }
        .hero-device::after { content: ''; position: absolute; top: 18px; right: 18px; width: 35px; height: 35px; border-radius: 10px; background: #d2d2d7; border: 1px solid #c7c7cc; }

        /* GRID CATEGORÍAS (Blancas y limpias) */
        .section-title { font-size: 20px; font-weight: 800; padding: 0 20px; margin-bottom: 16px; color: var(--text-main); letter-spacing: -0.5px;}
        .grid-wrapper { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 0 20px; }
        
        .glass-card {
            background: var(--card-glass); border: 1px solid #ffffff; border-radius: 24px;
            padding: 20px 16px; text-decoration: none; color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: var(--shadow-soft);
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        .glass-card:active { transform: scale(0.95); background: #ffffff; }

        /* VECTORES CSS (Ajustados al Light Theme) */
        .image-visual-space { width: 100%; height: 75px; background: rgba(0,0,0,0.02); border-radius: 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; }
        .vector-icon { position: relative; display: flex; justify-content: center; align-items: center; transform: scale(0.7); }
        
        .v-phone { width: 55px; height: 100px; border-radius: 14px; background: #ffffff; border: 2px solid #d2d2d7; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
        .v-phone::before { content:''; position:absolute; top:8px; left:8px; width:15px; height:25px; border:2px solid #e5e5ea; border-radius:6px; }
        
        .v-cash { width: 85px; height: 50px; border-radius: 10px; background: #ffffff; border: 2px solid #d2d2d7; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
        .v-cash::before { content:'$'; position:absolute; font-size: 24px; font-weight: 900; color: var(--brand-blue); }
        .v-cash::after { content:''; position:absolute; width: 34px; height: 34px; border: 2px dashed #d2d2d7; border-radius: 50%; }

        .v-repair { width: 56px; height: 56px; border-radius: 50%; background: #ffffff; border: 4px dashed #d2d2d7; box-shadow: inset 0 0 10px rgba(0,0,0,0.02), 0 5px 15px rgba(0,0,0,0.06); animation: rotateSlow 10s linear infinite; }
        .v-repair::after { content:''; position:absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #d2d2d7; }
        @keyframes rotateSlow { 100% { transform: scale(0.7) rotate(360deg); } }

        .v-laptop { width: 90px; height: 55px; border-radius: 8px 8px 0 0; background: #ffffff; border: 2px solid #d2d2d7; border-bottom: 8px solid #c7c7cc; box-shadow: 0 5px 15px rgba(0,0,0,0.06); }
        .v-laptop::before { content:''; position:absolute; top: 6px; width: 74px; height: 38px; border: 1px solid #e5e5ea; border-radius: 4px; background: var(--bg-light); }

        .card-title { font-size: 15px; font-weight: 800; margin: 0; text-align: center; color: var(--text-main); }

        /* 4. BOTTOM NAVBAR FLOTANTE (Píldora Blanca) */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; 
            background: var(--nav-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.8); border-radius: 35px; 
            display: flex; justify-content: space-around; padding: 12px 10px; z-index: 10000; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .nav-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; color: var(--text-muted); position: relative; transition: all 0.3s; }
        .nav-tab.active { color: var(--brand-blue); transform: translateY(-3px); }
        .nav-tab svg { width: 22px; height: 22px; fill: currentColor; }
        .nav-label { font-size: 10px; font-weight: 700; }
        .cart-badge { position: absolute; top: -6px; right: -6px; background: #ff3b30; color: #fff; font-size: 9px; font-weight: 800; padding: 3px 6px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 8px rgba(255,59,48,0.3); border: 2px solid #fff; }

        /* ADAPTACIÓN A ESCRITORIO (PC) */
        @media (min-width: 768px) {
            .app-wrapper { max-width: 1100px; padding-top: 30px; }
            .top-navbar { border-radius: 24px; margin: 0 20px 30px 20px; top: 20px; border: 1px solid #fff; box-shadow: var(--shadow-soft); }
            .search-wrapper { max-width: 600px; margin: 0 auto 30px auto; }
            .suggestions-dropdown { left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; }
            .hero-banner { display: flex; align-items: center; justify-content: space-between; padding: 40px; margin: 0 20px 40px 20px; }
            .hero-content { max-width: 50%; }
            .hero-subtitle { max-width: 100%; font-size: 15px; }
            .hero-device { position: relative; right: 0; bottom: 0; transform: rotate(-5deg); width: 180px; height: 240px; }
            .grid-wrapper { grid-template-columns: repeat(4, 1fr); gap: 24px; }
            .section-title { font-size: 24px; }
            .bottom-nav { max-width: 500px; padding: 15px 20px; border-radius: 40px; }
            .nav-tab svg { width: 26px; height: 26px; }
            .nav-label { font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- OVERLAY TRANSICIÓN BLANCO PARA EFECTO SUAVE -->
    <div class="page-transition-overlay" id="pageTransition"></div>

    <!-- FONDO CSS CLARO INQUEBRANTABLE -->
    <div class="css-interactive-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="app-wrapper">
        
        <header class="top-navbar">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            <div class="nav-center">
                <img src="https://raw.githubusercontent.com/j0elsito/j0elsito.github.io/579a1a6e8e73522cf6233557c309824623807b9e/tecnotrade/perfiltecnotrade.png" class="nav-logo-img" alt="Logo">
                <h1 class="logo-text">Tecno<span>Trade</span></h1>
            </div>
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </header>

        <div class="search-wrapper">
            <div class="search-box">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar modelo (ej: 15 Pro Max)..." autocomplete="off">
            </div>
            <div id="suggestionsBox" class="suggestions-dropdown"></div>
        </div>

        <section class="hero-section">
            <div class="hero-banner">
                <div class="hero-content">
                    <span class="hero-tag">Destacado</span>
                    <h2 class="hero-title">iPhone 16 Pro</h2>
                    <p class="hero-subtitle">Descubre el nuevo diseño y usa tu equipo como abono.</p>
                    <a href="catalogo.html#iphone-16-pro" class="hero-btn navigate-link">Comprar ahora</a>
                </div>
                <div class="hero-device"></div>
            </div>
        </section>

        <div class="section-title">Categorías</div>
        <div class="grid-wrapper">
            <a href="catalogo.html" class="glass-card navigate-link">
                <div class="image-visual-space"><div class="vector-icon v-phone"></div></div>
                <h2 class="card-title">Equipos</h2>
            </a>
            <a href="vender.html" class="glass-card">
                <div class="image-visual-space"><div class="vector-icon v-cash"></div></div>
                <h2 class="card-title">Vender</h2>
            </a>
            <a href="reparar.html" class="glass-card">
                <div class="image-visual-space"><div class="vector-icon v-repair"></div></div>
                <h2 class="card-title">Reparar</h2>
            </a>
            <a href="laptops.html" class="glass-card">
                <div class="image-visual-space"><div class="vector-icon v-laptop"></div></div>
                <h2 class="card-title">Laptops</h2>
            </a>
        </div>
        
    </div>

    <!-- BOTTOM NAVBAR FLOTANTE BLANCA -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-tab active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">Inicio</span>
        </a>
        <a href="catalogo.html" class="nav-tab navigate-link">
            <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            <span class="nav-label">Catálogo</span>
        </a>
        <a href="#" class="nav-tab">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span class="nav-label">Favoritos</span>
        </a>
        <a href="#" class="nav-tab">
            <div class="cart-badge">2</div>
            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <span class="nav-label">Carrito</span>
        </a>
    </nav>

    <!-- SCRIPTS -->
    <script>
        // Transición de Página Blanca
        document.addEventListener("DOMContentLoaded", () => {
            const overlay = document.getElementById('pageTransition');
            setTimeout(() => { overlay.style.opacity = '0'; }, 50);

            const navLinks = document.querySelectorAll('.navigate-link');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetUrl = this.getAttribute('href');
                    overlay.style.opacity = '1'; 
                    setTimeout(() => { window.location.assign(targetUrl); }, 400); 
                });
            });
        });

        // Base de Datos Búsqueda
        const inventory = [
            { name: "Samsung Galaxy", id: "android-samsung" },
            { name: "Honor", id: "android-honor" },
            { name: "Xiaomi", id: "android-xiaomi" },
            { name: "Google Pixel", id: "android-pixel" },
            { name: "Redmi", id: "android-redmi" },
            { name: "iPhone 17", id: "iphone-17" },
            { name: "iPhone 17 Plus", id: "iphone-17-plus" },
            { name: "iPhone 17 Pro", id: "iphone-17-pro" },
            { name: "iPhone 17 Pro Max", id: "iphone-17-pro-max" },
            { name: "iPhone 16", id: "iphone-16" },
            { name: "iPhone 16 Plus", id: "iphone-16-plus" },
            { name: "iPhone 16 Pro", id: "iphone-16-pro" },
            { name: "iPhone 16 Pro Max", id: "iphone-16-pro-max" },
            { name: "iPhone 15", id: "iphone-15" },
            { name: "iPhone 15 Plus", id: "iphone-15-plus" },
            { name: "iPhone 15 Pro", id: "iphone-15-pro" },
            { name: "iPhone 15 Pro Max", id: "iphone-15-pro-max" },
            { name: "iPhone 14", id: "iphone-14" },
            { name: "iPhone 14 Plus", id: "iphone-14-plus" },
            { name: "iPhone 14 Pro", id: "iphone-14-pro" },
            { name: "iPhone 14 Pro Max", id: "iphone-14-pro-max" },
            { name: "iPhone 13 Mini", id: "iphone-13-mini" },
            { name: "iPhone 13", id: "iphone-13" },
            { name: "iPhone 13 Pro", id: "iphone-13-pro" },
            { name: "iPhone 13 Pro Max", id: "iphone-13-pro-max" },
            { name: "iPhone 12 Mini", id: "iphone-12-mini" },
            { name: "iPhone 12", id: "iphone-12" },
            { name: "iPhone 12 Pro", id: "iphone-12-pro" },
            { name: "iPhone 12 Pro Max", id: "iphone-12-pro-max" },
            { name: "iPhone 11", id: "iphone-11" },
            { name: "iPhone 11 Pro", id: "iphone-11-pro" },
            { name: "iPhone 11 Pro Max", id: "iphone-11-pro-max" }
        ];

        const searchInput = document.getElementById('searchInput');
        const suggestionsBox = document.getElementById('suggestionsBox');
        const overlay = document.getElementById('pageTransition'); 

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            suggestionsBox.innerHTML = ''; 

            if (query.length > 0) {
                const filtered = inventory.filter(item => item.name.toLowerCase().includes(query));
                if (filtered.length > 0) {
                    suggestionsBox.style.display = 'block'; 
                    filtered.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerHTML = `<span>${item.name}</span> <span class="suggestion-arrow">▶</span>`;
                        div.onclick = function() {
                            overlay.style.opacity = '1';
                            setTimeout(() => { window.location.assign(`catalogo.html#${item.id}`); }, 400);
                        };
                        suggestionsBox.appendChild(div);
                    });
                } else {
                    suggestionsBox.style.display = 'block';
                    suggestionsBox.innerHTML = `<div class="suggestion-item" style="color: #86868b; text-align:center;">No se encontraron modelos</div>`;
                }
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                suggestionsBox.style.display = 'none';
            }
        });
    </script>
</body>
</html>
